project:
  type: website
  output-dir: docs            # GitHub Pages serves from /docs on main branch
  render:
    - "*.qmd"
    - "*.md"
    - "!**/*.Rmd" # exclude all .Rmd files from automatic rendering. This way you can keep them in same directory as reference.
    # - "tutorials/rprogramming/rprogramming.Rmd" # uncomment to render specific .Rmd
website:
  title: "GEN242"
  description: "Data Analysis in Genome Biology — UC Riverside"
  site-url: "https://girke.bioinformatics.ucr.edu/GEN242_new"
  repo-url: "https://github.com/tgirke/GEN242_new"
  repo-actions: [edit, issue]
  favicon: assets/favicon.ico

  # ── Top navigation bar ─────────────────────────────────────────────────────
  # Flat, like quarto.org: one word per section, minimal dropdowns.
  # Sections with many pages (Slides, Tutorials, Assignments) open into a
  # full page with a left sidebar — no deep menu nesting.
  navbar:
    logo: assets/logo_gen242.png
    logo-alt: "GEN242"
    title: false
    pinned: true
    background: light           # white navbar, matching quarto.org style
    foreground: dark
    left:
      - text: "Overview"
        menu:
          - text: "Introduction"
            href: overview/introduction.qmd
          - text: "Syllabus"
            href: overview/syllabus.qmd
          - text: "Schedule"
            href: overview/schedule.qmd
      - text: "Schedule"
        href: overview/schedule.qmd
      - text: "Slides"
        href: slides/index.qmd
      - text: "Tutorials"
        href: tutorials/index.qmd
      - text: "Assignments"
        href: assignments/index.qmd
      - text: "Links"
        href: links/index.qmd
    right:
      - icon: github
        href: https://github.com/tgirke/GEN242
        aria-label: GitHub

  # ── Sidebars ───────────────────────────────────────────────────────────────
  # Three docked sidebars — one each for Slides, Tutorials, Assignments.
  # Activated via `sidebar: <id>` in a page's YAML front matter, just like
  # quarto.org's Guide sidebar activates when you're reading the Guide section.
  sidebar:

    # ── Slides ───────────────────────────────────────────────────────────────
    - id: slides
      title: "Slides"
      style: docked
      background: light
      collapse-level: 1
      contents:
        - text: "All Slides"
          href: slides/index.qmd
        - section: "Foundations"
          contents:
            - text: "S1 — Course Introduction"
              href: slides/slides_01.qmd
            - text: "S2 — Genome Basics"
              href: slides/slides_02.qmd
            - text: "S3 — Databases & Software"
              href: slides/slides_03.qmd
            - text: "S4 — Git and GitHub"
              href: slides/slides_04.qmd
            - text: "S5 — Linux Cluster"
              href: slides/slides_05.qmd
            - text: "S6 — DNA Sequencing"
              href: slides/slides_06.qmd
        - section: "R Programming"
          contents:
            - text: "S7 — Introduction to R"
              href: slides/slides_07.qmd
            - text: "S9 — Programming in R"
              href: slides/slides_09.qmd
            - text: "S12 — R on HPC"
              href: slides/slides_12.qmd
            - text: "S21 — Graphics in R"
              href: slides/slides_21.qmd
            - text: "S22 — Tidyverse & SQLite"
              href: slides/slides_22.qmd
            - text: "S23 — Building R Packages"
              href: slides/slides_23.qmd
        - section: "NGS Analysis"
          contents:
            - text: "S8 — Sequence Alignments"
              href: slides/slides_08.qmd
            - text: "S10 — Multiple Alignments"
              href: slides/slides_10.qmd
            - text: "S11 — Short Read Alignments"
              href: slides/slides_11.qmd
            - text: "S13 — NGS Analysis Basics"
              href: slides/slides_13.qmd
            - text: "S14 — Gene Expression"
              href: slides/slides_14.qmd
            - text: "S15 — NGS Workflows"
              href: slides/slides_15.qmd
            - text: "S16 — Cluster Analysis"
              href: slides/slides_16.qmd
            - text: "S17 — Enrichment Analysis"
              href: slides/slides_17.qmd
            - text: "S18 — ChIP-Seq"
              href: slides/slides_18.qmd
            - text: "S19 — VAR-Seq"
              href: slides/slides_19.qmd

    # ── Tutorials ────────────────────────────────────────────────────────────
    - id: tutorials
      title: "Tutorials"
      style: docked
      background: light
      collapse-level: 1
      contents:
        - text: "All Tutorials"
          href: tutorials/index.qmd
        - section: "Computing Environment"
          contents:
            - text: "T1 — GitHub Introduction"
              href: tutorials/github/github.qmd
            - text: "T2 — Linux & HPCC Cluster"
              href: tutorials/linux/linux.qmd
        - section: "Analysis Programming"
          contents:
            - text: "T3 — Introduction to R"
              href: tutorials/rbasics/rbasics_index.qmd
            - text: "T4 — Programming in R"
              href: tutorials/rprogramming/rprogramming_index.qmd
            - text: "T5 — Parallel R"
              href: tutorials/rparallel/rparallel_index.qmd
            - text: "T14 — R Markdown"
              href: tutorials/rmarkdown/rmarkdown_index.qmd
            - text: "T16 — Graphics & Visualization"
              href: tutorials/rgraphics/rgraphics_index.qmd
            - text: "T17 — Shiny Apps"
              href: tutorials/shinyapps/shinyapps_index.qmd
            - text: "T18 — Tidyverse & SQLite"
              href: tutorials/dplyr/dplyr_index.qmd
            - text: "T19 — Building R Packages"
              href: tutorials/rpackages/rpackages_index.qmd
        - section: "Analysis Applications"
          contents:
            - text: "T6 — NGS Analysis Basics"
              href: tutorials/rsequences/rsequences_index.qmd
            - text: "T7 — Workflow Framework"
              href: tutorials/systempiper/index.qmd
            - text: "T8 — RNA-Seq Workflow"
              href: tutorials/sprnaseq/index.qmd
            - text: "T9 — Cluster Analysis"
              href: tutorials/rclustering/index.qmd
            - text: "T10 — Enrichment Analysis"
              href: tutorials/rfea/index.qmd
            - text: "T11 — ChIP-Seq Workflow"
              href: tutorials/spchipseq/index.qmd
            - text: "T12 — scRNA-Seq Methods"
              href: tutorials/scrnaseq/index.qmd
            - text: "T13 — VAR-Seq Workflow"
              href: tutorials/spvarseq/index.qmd
            - text: "T20 — CWL Automation"
              href: tutorials/cmdtocwl/index.qmd

    # ── Assignments ──────────────────────────────────────────────────────────
    - id: assignments
      title: "Assignments"
      style: docked
      background: light
      collapse-level: 1
      contents:
        - text: "Overview"
          href: assignments/index.qmd
        - section: "Homework"
          contents:
            - text: "HW1 — Intro & GitHub"
              href: assignments/homework/hw01/index.qmd
            - text: "HW2 — Linux & HPC"
              href: assignments/homework/hw02/index.qmd
            - text: "HW3 — R Basics"
              href: assignments/homework/hw03/index.qmd
            - text: "HW4 — Alignments"
              href: assignments/homework/hw04/index.qmd
            - text: "HW5 — R Programming"
              href: assignments/homework/hw05/index.qmd
            - text: "HW6 — NGS Analysis"
              href: assignments/homework/hw06/index.qmd
            - text: "HW7 — RNA-Seq"
              href: assignments/homework/hw07/index.qmd
            - text: "HW8 — R Markdown"
              href: assignments/homework/hw08/index.qmd
        - section: "Projects"
          contents:
            - text: "Project Overview"
              href: assignments/projects/index.qmd
            - text: "Project Data"
              href: assignments/projects/project_data/index.qmd

  # ── Footer ─────────────────────────────────────────────────────────────────
  page-footer:
    left: "© 2026 Thomas Girke, UC Riverside"
    right:
      - text: "GEN242 on GitHub"
        href: https://github.com/tgirke/GEN242

  page-navigation: true
  back-to-top-navigation: true

  search:
    location: navbar
    type: overlay

# ── Format defaults ────────────────────────────────────────────────────────
# Matches the quarto.org docs look: cosmo base, barely any custom styling.
format:
  html:
    theme:
      light: [cosmo, assets/custom.scss]
      dark:  [darkly, assets/custom-dark.scss]
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: true
    code-line-numbers: true
    highlight-style: github
    df-print: paged
    fig-align: center
    fig-responsive: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    grid:
      sidebar-width: 270px
      body-width: 900px
      margin-width: 200px

# ── Execution defaults ─────────────────────────────────────────────────────
execute:
  freeze: auto
  cache: true
  warning: false
  message: false
