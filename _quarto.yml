project:
  type: website
  output-dir: docs
  render:
    - "**/*.qmd"        # render all .qmd files everywhere
    - "**/*.md"         # render all .md files
    - "!**/*.Rmd"       # exclude .Rmd (keep as reference source)
    - "!**/*.html"      # exclude pre-rendered HTML decks (RevealJS etc.)

website:
  title: "GEN242"
  description: "Data Analysis in Genome Biology — UC Riverside"
  site-url: "https://girke.bioinformatics.ucr.edu/GEN242"
  repo-url: "https://github.com/tgirke/GEN242"
  repo-actions: [edit, issue]
  favicon: assets/favicon.ico

  # ──Notification banner: comment out when not needed
  # announcement:
  #  icon: info-circle
  #  dismissable: true
  #  content: "**New:** This site has transitioned to Quarto. At this point, functionalities are still limited, and content is not yet complete."
  #  type: info  # info: blue, warning: yellow, danger: red, success: green
  #  position: below-navbar # below-navbar: appears just below the top navbar; above-navbar: appears above the navbar at the very top

  # ── Top navigation bar ─────────────────────────────────────────────────────
  # Flat, like quarto.org: one word per section, minimal dropdowns.
  # Sections with many pages (Slides, Tutorials, Assignments) open into a
  # full page with a left sidebar — no deep menu nesting.
  navbar:
    logo: assets/logo_gen242.png
    logo-alt: "GEN242"
    title: false
    pinned: true
    background: light           # white navbar, matching quarto.org style
    foreground: dark
    left:
      - text: "Overview"
        menu:
          - text: "Introduction"
            href: overview/introduction.qmd
          - text: "Syllabus"
            href: overview/syllabus.qmd
          - text: "Schedule"
            href: overview/schedule.qmd
      - text: "Schedule"
        href: overview/schedule.qmd
      - text: "Slides"
        href: slides/index.qmd
      - text: "Tutorials"
        href: tutorials/index.qmd
      - text: "Assignments"
        href: assignments/index.qmd
      - text: "Links"
        href: links/links.qmd
    right:
      - icon: github
        href: https://github.com/tgirke/GEN242
        aria-label: GitHub

  # ── Sidebars ───────────────────────────────────────────────────────────────
  # Three docked sidebars — one each for Slides, Tutorials, Assignments.
  # Activated via `sidebar: <id>` in a page's YAML front matter, just like
  # quarto.org's Guide sidebar activates when you're reading the Guide section.
  sidebar:

    # ── Slides ───────────────────────────────────────────────────────────────
    - id: slides
      title: "Slides"
      style: docked
      background: light
      collapse-level: 1
      contents:
        - text: "All Slides"
          href: slides/index.qmd
        - section: "Foundations"
          contents:
            - text: "Course Introduction"
              href: slides/course_intro/course_intro_page.qmd
            - text: "Linux and HPC"
              href: slides/linux_hpc_intro/linux_hpc_intro_page.qmd
            - text: "Git and GitHub"
              href: slides/github_intro/github_intro_page.qmd
            - text: "DNA Sequencing"
              href: slides/sequencing_technologies/sequencing_technologies.qmd
        - section: "R Programming"
          contents:
            - text: "Introduction to R"
              href: slides/rbasics/rbasics_page.qmd
            - text: "Programming in R"
              href: slides/rprogramming/rprogramming_page.qmd
            - text: "R on HPC"
              href: slides/rhpc/rhpc_page.qmd
            - text: "Graphics in R"
              href: slides/slides_21.qmd
            - text: "Tidyverse & SQLite"
              href: slides/slides_22.qmd
            - text: "Building R Packages"
              href: slides/slides_23.qmd
        - section: "Data Analysis"
          contents:
            - text: "Sequence Alignments"
              href: slides/sequence_alignments/sequence_alignments.qmd
            - text: "Multiple Alignments"
              href: slides/msa/msa.qmd
            - text: "Short Read Alignments"
              href: slides/short_read_alignments/short_read_alignments.qmd
            - text: "NGS Analysis Basics"
              href: slides/rsequences/rsequences_page.qmd
            - text: "Gene Expression"
              href: slides/expression_analysis/expression_analysis.qmd
            - text: "NGS Workflows"
              href: slides/slides_15.qmd
            - text: "Cluster Analysis"
              href: slides/slides_16.qmd
            - text: "Enrichment Analysis"
              href: slides/slides_17.qmd
            - text: "ChIP-Seq"
              href: slides/slides_18.qmd
            - text: "VAR-Seq"
              href: slides/slides_19.qmd

    # ── Tutorials ────────────────────────────────────────────────────────────
    - id: tutorials
      title: "Tutorials"
      style: docked
      background: light
      collapse-level: 2
      contents:
        - text: "All Tutorials"
          href: tutorials/index.qmd
        - section: "Computing Environment"
          contents:
            - text: "Linux & HPCC Cluster"
              href: tutorials/linux/linux.qmd
            - text: "GitHub Introduction"
              href: tutorials/github/github.qmd
        - section: "Analysis Programming"
          contents:
            - text: "Introduction to R"
              href: tutorials/rbasics/rbasics_index.qmd
            - text: "Programming in R"
              href: tutorials/rprogramming/rprogramming_index.qmd
            - text: "Parallel R"
              href: tutorials/rparallel/rparallel_index.qmd
            - text: "R Markdown"
              href: tutorials/rmarkdown/rmarkdown_index.qmd
            - text: "Graphics & Visualization"
              href: tutorials/rgraphics/rgraphics_index.qmd
            - text: "Shiny Apps"
              href: tutorials/shinyapps/shinyapps_index.qmd
            - text: "Tidyverse & SQLite"
              href: tutorials/dplyr/dplyr_index.qmd
            - text: "Building R Packages"
              href: tutorials/rpackages/rpackages_index.qmd
        - section: "Analysis Applications"
          contents:
            - text: "NGS Analysis Basics"
              href: tutorials/rsequences/rsequences_index.qmd
            - text: "Workflow Framework"
              href: tutorials/systempiper/systemPipeR_index.qmd
            - text: "RNA-Seq Workflow"
              href: tutorials/sprnaseq/sprnaseq_index.qmd
            - text: "Cluster Analysis"
              href: tutorials/rclustering/rclustering_index.qmd
            - text: "Enrichment Analysis"
              href: tutorials/rfea/rfea_index.qmd
            - text: "ChIP-Seq Workflow"
              href: tutorials/spchipseq/spchipseq_index.qmd
            - text: "scRNA-Seq Methods"
              href: tutorials/scrnaseq/scrnaseq_index.qmd
            - text: "VAR-Seq Workflow"
              href: tutorials/spvarseq/spvarseq_index.qmd
            - text: "CWL Automation"
              href: tutorials/cmdtocwl/cmdtocwl_index.qmd

    # ── Assignments ──────────────────────────────────────────────────────────
    - id: assignments
      title: "Assignments"
      style: docked
      background: light
      collapse-level: 2
      contents:
        - text: "Overview"
          href: assignments/index.qmd
        - section: "Homework"
          contents:
            - text: "HW1 — Linux & HPC"
              href: assignments/homework/hw01/hw01.qmd 
            - text: "HW2 — R Basics"
              href: assignments/homework/hw02/hw02.qmd
            - text: "HW3 — Alignments"
              href: assignments/homework/hw03/hw03.qmd
            - text: "HW4 — R Programming"
              href: assignments/homework/hw04/hw04.qmd
            - text: "HW5 — NGS Analysis"
              href: assignments/homework/hw05/hw05.qmd
            #- text: "HW6 — RNA-Seq"
            #  href: assignments/homework/hw07/index.qmd
            #- text: "HW7 — R Markdown"
            #  href: assignments/homework/hw08/index.qmd
        - section: "Projects"
          contents:
            - text: "Project Overview"
              href: assignments/projects/index.qmd
            - text: "Project Data"
              href: assignments/projects/project_data/index.qmd

  # ── Footer ─────────────────────────────────────────────────────────────────
  page-footer:
    left: "© 2026 Thomas Girke, UC Riverside"
    right:
      - text: "GEN242 on GitHub"
        href: https://github.com/tgirke/GEN242

  page-navigation: true
  back-to-top-navigation: true

  search:
    location: navbar
    type: overlay

# ── Format defaults ────────────────────────────────────────────────────────
# Matches the quarto.org docs look: cosmo base, barely any custom styling.
format:
  html:
    theme:
      light: [cosmo, assets/custom.scss]
      dark:  [darkly, assets/custom-dark.scss]
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: true
    code-line-numbers: true
    highlight-style: github
    df-print: paged
    fig-align: center
    fig-responsive: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true
    grid:
      sidebar-width: 270px
      body-width: 900px
      margin-width: 200px

# ── Execution defaults ─────────────────────────────────────────────────────
execute:
  freeze: auto
  cache: true
  warning: false
  message: false
