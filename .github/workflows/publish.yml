name: Render and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install R ─────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      # ── 3. Cache R packages ───────────────────────────────────────────────────
      # id: cache-r lets downstream steps check cache-hit and skip installs
      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.5-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: ${{ runner.os }}-r-4.5-

      # ── 4. Install system libraries ───────────────────────────────────────────
      # Only runs on a cache miss — system libs are not cached by actions/cache
      # but apt-get is fast (~30s) so we always run this step
      - name: Install system dependencies
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libharfbuzz-dev libfribidi-dev \
            libgit2-dev libfontconfig1-dev libfreetype6-dev \
            libbamtools-dev libboost-all-dev

      # ── 5. Install CRAN packages ──────────────────────────────────────────────
      - name: Install CRAN packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            cran_pkgs <- c(
              "BiocManager", "knitr", "rmarkdown", "DT", "dplyr",
              "ggplot2", "reticulate", "htmlwidgets", "plotly",
              "tidyr", "stringr", "tibble", "purrr", "readr",
              "RSQLite", "dbplyr", "ggrepel", "pheatmap", "RColorBrewer", 
              "tidyverse"
            )
            install.packages(cran_pkgs, repos = "https://cloud.r-project.org")
          '

      # ── 6. Install core Bioconductor packages ─────────────────────────────────
      - name: Install core Bioconductor packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            BiocManager::install(version = "3.22", ask = FALSE)
            BiocManager::install(c(
              "GenomicRanges", "GenomicFeatures", "GenomicAlignments",
              "Biostrings", "IRanges", "S4Vectors",
              "DESeq2", "edgeR", "limma",
              "BiocParallel",
              "AnnotationDbi", "org.Hs.eg.db", "org.At.tair.db",
              "TxDb.Athaliana.BioMart.plantsmart28", "txdbmaker",
              "BSgenome.Athaliana.TAIR.TAIR9"
            ), ask = FALSE, update = FALSE)
          '

      # ── 7. Install clusterProfiler ────────────────────────────────────────────
      - name: Install clusterProfiler
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            BiocManager::install(c(
              "BiocGenerics", "Biobase", "graphite", "RBGL", "graph",
              "gson", "HDO.db", "DOSE", "fgsea", "enrichplot",
              "treeio", "ggtree", "yulab.utils", "aplot"
            ), ask = FALSE, update = FALSE)
            BiocManager::install("clusterProfiler", ask = FALSE, update = FALSE)
          '

      # ── 8. Install single-cell packages ──────────────────────────────────────
      - name: Install single-cell packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            BiocManager::install(c(
              "SingleCellExperiment", "SummarizedExperiment",
              "DelayedArray", "DelayedMatrixStats",
              "scuttle", "bluster", "metapod", "igraph",
              "BiocNeighbors", "BiocSingular", "ResidualMatrix",
              "dqrng", "edgeR", "limma"
            ), ask = FALSE, update = FALSE)
            BiocManager::install(c("scran", "scater"),
                                 ask = FALSE, update = FALSE)
          '

      # ── 9. Install systemPipeR ────────────────────────────────────────────────
      - name: Install systemPipeR
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            BiocManager::install(c(
              "systemPipeR", "systemPipeRdata"
            ), ask = FALSE, update = FALSE)
          '

      # ── 10. Install ChIP/VAR packages ─────────────────────────────────────────
      - name: Install ChIP and VAR packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          Rscript -e '
            BiocManager::install(c(
              "ChIPseeker", "DiffBind",
              "VariantAnnotation", "VariantFiltering"
            ), ask = FALSE, update = FALSE)
          '

      # ── 11. Audit installed packages ──────────────────────────────────────────
      # Always runs so we can see package status in every build log
      - name: Audit installed R packages
        run: |
          Rscript -e '
            pkgs <- installed.packages()[, c("Package", "Version")]
            cat("\n===== BIOCONDUCTOR VERSION =====\n")
            cat(as.character(BiocManager::version()), "\n")
            expected <- c(
              "BiocManager", "knitr", "rmarkdown", "DT", "dplyr", "ggplot2",
              "reticulate", "htmlwidgets", "plotly", "tidyr", "stringr",
              "DESeq2", "edgeR", "limma", "clusterProfiler",
              "systemPipeR", "GenomicRanges", "Biostrings",
              "SingleCellExperiment", "scran", "scater",
              "AnnotationDbi", "org.Hs.eg.db", "org.At.tair.db"
            )
            missing <- expected[!expected %in% rownames(pkgs)]
            if (length(missing) > 0) {
              cat("\n===== MISSING PACKAGES =====\n")
              cat(paste(missing, collapse = "\n"), "\n")
            } else {
              cat("\n===== ALL EXPECTED PACKAGES PRESENT =====\n")
            }
          '

      # ── 12. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install numpy pandas matplotlib seaborn

      # ── 13. Install Quarto ────────────────────────────────────────────────────
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.56"

      # ── 14. Restore Quarto freeze cache ───────────────────────────────────────
      - name: Restore Quarto freeze cache
        uses: actions/cache@v4
        with:
          path: _freeze
          key: quarto-freeze-${{ hashFiles('**/*.qmd', '**/*.Rmd') }}
          restore-keys: quarto-freeze-

      # ── 15. Render site ───────────────────────────────────────────────────────
      - name: Render Quarto site
        run: quarto render

      # ── 16. Upload Pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
